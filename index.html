<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taylorismo: Minecraft Work</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; }
        #joy-container { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; z-index: 20; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid #777; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; background: rgba(0,0,0,0.7); padding: 5px;">MINERAÇÃO TAYLORISTA</h2>
        <div id="stats">EFICIÊNCIA: 100%</div>
    </div>

    <div id="crosshair"></div>
    <div id="joy-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script>

    <script>
        let scene, camera, renderer, joy;
        let moveF = 0, moveR = 0, yaw = 0, pitch = 0;
        let workers = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            scene.fog = new THREE.Fog(0x111111, 2, 30);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 5);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth / 2, window.innerHeight / 2, false);
            renderer.domElement.style.width = '100vw';
            renderer.domElement.style.height = '100vh';
            document.body.appendChild(renderer.domElement);

            // Luzes Estilo Tocha
            const ambient = new THREE.AmbientLight(0x333333);
            scene.add(ambient);

            function addTorch(x, z) {
                const p = new THREE.PointLight(0xffaa44, 2, 15);
                p.position.set(x, 2.5, z);
                scene.add(p);
            }
            for(let i=-20; i<20; i+=10) { addTorch(-4, i); addTorch(4, i); }

            // Chão e Paredes de Pedra
            const stoneMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            for(let z=-30; z<30; z++) {
                for(let x=-6; x<6; x++) {
                    const floor = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), stoneMat);
                    floor.position.set(x, -0.5, z);
                    scene.add(floor);
                }
            }

            // Criar Operários
            for(let i=0; i<8; i++) {
                createSteveWorker( (i%2==0 ? 3 : -3), i * -6 );
            }

            setupControls();
        }

        function createSteveWorker(x, z) {
            const worker = new THREE.Group();
            const matSkin = new THREE.MeshStandardMaterial({color: 0xffccaa});
            const matShirt = new THREE.MeshStandardMaterial({color: 0x008888});
            const matPants = new THREE.MeshStandardMaterial({color: 0x4444aa});

            // Tronco
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.9, 0.3), matShirt);
            torso.position.y = 1.25;
            worker.add(torso);

            // Cabeça
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), matSkin);
            head.position.y = 1.95;
            worker.add(head);

            // Braços
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), matSkin);
            armR.position.set(0.45, 1.3, 0);
            // Ponto de articulação do ombro
            const pivotR = new THREE.Group();
            pivotR.position.set(-0.45, 1.6, 0);
            armR.position.set(0, -0.3, 0);
            pivotR.add(armR);
            worker.add(pivotR);

            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), matSkin);
            armL.position.set(-0.45, 1.3, 0);
            worker.add(armL);

            // Pernas
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), matPants);
            legR.position.set(0.15, 0.4, 0);
            worker.add(legR);
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), matPants);
            legL.position.set(-0.15, 0.4, 0);
            worker.add(legL);

            // Bloco de Minério (O que eles quebram)
            const ore = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0x222222}));
            ore.position.set(0, 0.5, -1.2);
            worker.add(ore);

            worker.position.set(x, 0, z);
            worker.rotation.y = x > 0 ? -Math.PI/2 : Math.PI/2;
            scene.add(worker);
            
            workers.push({ group: worker, arm: pivotR, ore: ore });
        }

        function setupControls() {
            joy = nipplejs.create({ zone: document.getElementById('joy-container'), mode: 'static', position: {left: '50px', bottom: '50px'}, size: 80 });
            joy.on('move', (e, d) => {
                moveF = Math.sin(d.angle.radian) * d.distance / 40;
                moveR = Math.cos(d.angle.radian) * d.distance / 40;
            });
            joy.on('end', () => { moveF = 0; moveR = 0; });

            let lastX = 0, lastY = 0;
            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t.clientX > window.innerWidth / 2) {
                    if (lastX !== 0) {
                        yaw -= (t.clientX - lastX) * 0.005;
                        pitch -= (t.clientY - lastY) * 0.005;
                        pitch = Math.max(-1.4, Math.min(1.4, pitch));
                    }
                    lastX = t.clientX; lastY = t.clientY;
                }
            }, {passive: false});
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            const dir = new THREE.Vector3(moveR, 0, -moveF).applyQuaternion(camera.quaternion);
            dir.y = 0;
            camera.position.addScaledVector(dir, 0.1);

            // Animar Trabalho (Movimento repetitivo Taylorista)
            const time = Date.now() * 0.01;
            workers.forEach((w, i) => {
                const wave = Math.sin(time + i);
                w.arm.rotation.x = wave * 1.2; // Movimento de picareta
                
                // O bloco "reage" ao impacto
                const scale = 0.9 + (wave * 0.1);
                w.ore.scale.set(scale, scale, scale);
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
