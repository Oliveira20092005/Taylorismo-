<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taylorismo 3D - Fábrica</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: yellow; pointer-events: none; }
        .instrucoes { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; font-size: 10px; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0">FÁBRICA DE TAYLOR</h2>
        <p>Produtividade Máxima Requerida</p>
    </div>
    
    <div class="instrucoes">Arraste para girar | Use 2 dedos para andar/zoom</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. Cena e Câmera
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 10, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. Luzes
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 1.5));

        // 3. Chão (Grade da Fábrica)
        const grid = new THREE.GridHelper(100, 40, 0xffffff, 0x444444);
        scene.add(grid);

        // 4. Criando as "Máquinas" de Taylor (Vários Cubos)
        const geo = new THREE.BoxGeometry(2, 4, 2);
        for(let i=0; i<20; i++) {
            const mat = new THREE.MeshStandardMaterial({ color: 0x666666 });
            const box = new THREE.Mesh(geo, mat);
            box.position.x = (Math.random() - 0.5) * 50;
            box.position.z = (Math.random() - 0.5) * 50;
            box.position.y = 2; // Metade da altura para ficar no chão
            scene.add(box);
            
            // Um pequeno "trabalhador" (esfera) em cima de cada máquina
            const sphereGeo = new THREE.SphereGeometry(0.5);
            const sphereMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const worker = new THREE.Mesh(sphereGeo, sphereMat);
            worker.position.set(box.position.x, 4.5, box.position.z);
            scene.add(worker);
        }

        // 5. Controles (OrbitControls adaptado para toque)
        // Como estamos usando a versão de script comum, chamamos de forma diferente:
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 6. Animação
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Ajuste de tela
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
