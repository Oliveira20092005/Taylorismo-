<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taylorismo 3D Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #00ff00; pointer-events: none; z-index: 10; text-shadow: 2px 2px #000; }
        .instrucoes { position: absolute; bottom: 15px; width: 100%; text-align: center; color: rgba(255,255,255,0.7); font-size: 11px; z-index: 5; }
        #joy-container { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); z-index: 20; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0">FÁBRICA DE TAYLOR v2.0</h2>
        <div id="timer" style="font-size: 24px;">TEMPO: 00:00</div>
        <p style="color: #ffaa00;">SISTEMA: OTIMIZADO</p>
    </div>
    
    <div id="joy-container"></div>
    <div class="instrucoes">ESQUERDA: ANDAR | DIREITA: OLHAR</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script>

    <script>
        // 1. CENA E RENDER
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 5, 40);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 2. LUZES (Estilo Industrial Profissional)
        const light1 = new THREE.PointLight(0xffffff, 1, 50);
        light1.position.set(0, 10, 0);
        scene.add(light1);
        scene.add(new THREE.AmbientLight(0x404040, 0.5));

        // 3. CENÁRIO (Chão e Grades)
        const grid = new THREE.GridHelper(100, 50, 0x00ff00, 0x222222);
        scene.add(grid);

        // 4. OPERÁRIOS E MÁQUINAS (Mecânica de Taylor)
        const workers = [];
        const boxGeo = new THREE.BoxGeometry(1.5, 3, 1.5);
        const headGeo = new THREE.SphereGeometry(0.4);

        for(let i=0; i<30; i++) {
            const group = new THREE.Group();
            
            // Máquina
            const machine = new THREE.Mesh(boxGeo, new THREE.MeshStandardMaterial({color: 0x333333}));
            group.add(machine);

            // Operário (Esfera)
            const worker = new THREE.Mesh(headGeo, new THREE.MeshBasicMaterial({color: 0xff0000}));
            worker.position.y = 2.2;
            group.add(worker);

            group.position.set((Math.random()-0.5)*50, 1.5, (Math.random()-0.5)*50);
            scene.add(group);
            workers.push(worker);
        }

        // 5. CONTROLES MOBILE (Lado Esquerdo Andar / Direito Olhar)
        let moveForward = 0, moveRight = 0;
        let yaw = 0, pitch = 0;

        // Joystick
        const joy = nipplejs.create({ zone: document.getElementById('joy-container'), mode: 'static', position: {left: '50px', bottom: '50px'}, size: 80 });
        joy.on('move', (e, data) => {
            moveForward = Math.sin(data.angle.radian) * data.distance / 40;
            moveRight = Math.cos(data.angle.radian) * data.distance / 40;
        });
        joy.on('end', () => { moveForward = 0; moveRight = 0; });

        // Olhar (Touch no lado direito)
        let lastX = 0, lastY = 0;
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            if (touch.clientX > window.innerWidth / 2) {
                if (lastX !== 0) {
                    yaw -= (touch.clientX - lastX) * 0.005;
                    pitch -= (touch.clientY - lastY) * 0.005;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                }
                lastX = touch.clientX; lastY = touch.clientY;
            }
        }, {passive: false});
        window.addEventListener('touchend', () => { lastX = 0; lastY = 0; });

        // 6. CRONÔMETRO
        let sec = 0;
        setInterval(() => {
            sec++;
            const m = Math.floor(sec/60).toString().padStart(2,'0');
            const s = (sec%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `TEMPO: ${m}:${s}`;
        }, 1000);

        // 7. LOOP
        function animate() {
            requestAnimationFrame(animate);

            // Rotação da Câmera
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            // Movimento
            const dir = new THREE.Vector3(moveRight, 0, -moveForward).applyQuaternion(camera.quaternion);
            dir.y = 0;
            camera.position.addScaledVector(dir, 0.1);

            // Animação Operários (Taylorismo: Movimento repetitivo)
            workers.forEach((w, i) => {
                w.position.y = 2.2 + Math.sin(Date.now() * 0.005 + i) * 0.2;
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
