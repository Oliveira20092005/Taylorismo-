<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fábrica Taylorista VR</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }
#ui {
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:10px 15px;
  border-radius:12px;
  color:white;
  z-index:10;
}
</style>
</head>
<body>

<div id="ui">Aponte e aperte o gatilho para interagir</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";
import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/webxr/VRButton.js";

let scene, camera, renderer;
let controller1, controller2;
let player;

const interactables = [];

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0f1c);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  document.body.appendChild(VRButton.createButton(renderer));

  // Luz
  const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
  scene.add(light);

  // Chão
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(100,100),
    new THREE.MeshStandardMaterial({ color:0x555555 })
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // Player
  player = new THREE.Group();
  player.position.set(0,1.6,5);
  player.add(camera);
  scene.add(player);

  // Estações
  createStation(-5,0,"Taylorismo");
  createStation(5,0,"Divisão do trabalho");
  createStation(-5,10,"Tempo e movimentos");
  createStation(5,10,"Críticas");

  // CONTROLES VR
  controller1 = renderer.xr.getController(0);
  controller2 = renderer.xr.getController(1);

  scene.add(controller1);
  scene.add(controller2);

  controller1.addEventListener("selectstart", onSelect);
  controller2.addEventListener("selectstart", onSelect);

  // LASER VISUAL
  const geometry = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-1)
  ]);

  const line = new THREE.Line(geometry);
  line.name = "laser";
  line.scale.z = 10;

  controller1.add(line.clone());
  controller2.add(line.clone());

  window.addEventListener("resize", onResize);
}

function createStation(x,z,text){
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshStandardMaterial({ color:0x2563eb })
  );
  mesh.position.set(x,1,z);
  mesh.userData.text = text;

  scene.add(mesh);
  interactables.push(mesh);
}

function onSelect(event){
  const controller = event.target;

  const raycaster = new THREE.Raycaster();
  const tempMatrix = new THREE.Matrix4();

  tempMatrix.identity().extractRotation(controller.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

  const intersects = raycaster.intersectObjects(interactables);

  if(intersects.length > 0){
    const obj = intersects[0].object;
    alert("Você interagiu com: " + obj.userData.text);
  }
}

function animate(){
  renderer.setAnimationLoop(render);
}

function render(){
  movePlayer();
  renderer.render(scene, camera);
}

function movePlayer(){
  const session = renderer.xr.getSession();
  if(!session) return;

  const sources = session.inputSources;

  sources.forEach(source=>{
    if(source.gamepad){
      const axes = source.gamepad.axes;

      const speed = 0.1;

      player.position.x += axes[2] * speed;
      player.position.z += axes[3] * speed;
    }
  });
}

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
