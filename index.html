<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taylorismo 3D - Experiência Industrial</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #00ff00; pointer-events: none; text-shadow: 2px 2px #000; }
        #cronometro { font-size: 24px; font-weight: bold; }
        .legenda { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; font-size: 12px; background: rgba(0,0,0,0.5); padding: 5px 0; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0">CONTROLE DE TEMPOS E MOVIMENTOS</h2>
        <div id="cronometro">TEMPO: 00:00</div>
        <p id="status">SISTEMA DE TAYLOR: ATIVO</p>
    </div>
    
    <div class="legenda">Gire com 1 dedo | Ande/Aproxime com 2 dedos</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 10, 70);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
        const light = new THREE.PointLight(0xffaa00, 2, 50);
        light.position.set(0, 15, 0);
        scene.add(light);

        const grid = new THREE.GridHelper(100, 50, 0x333333, 0x222222);
        scene.add(grid);

        // --- CRIAÇÃO DOS OPERÁRIOS E MÁQUINAS ---
        const operarios = [];
        const boxGeo = new THREE.BoxGeometry(2, 4, 2);
        const sphereGeo = new THREE.SphereGeometry(0.6);

        for(let i=0; i<25; i++) {
            const matFábrica = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const box = new THREE.Mesh(boxGeo, matFábrica);
            box.position.set((Math.random()-0.5)*60, 2, (Math.random()-0.5)*60);
            scene.add(box);
            
            // O Operário (Esfera Vermelha)
            const opMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const worker = new THREE.Mesh(sphereGeo, opMat);
            worker.position.set(box.position.x, 5, box.position.z);
            
            // Dados para animação individual
            worker.userData = { 
                offset: Math.random() * Math.PI * 2,
                velocidade: 0.05 + Math.random() * 0.05 
            };
            
            scene.add(worker);
            operarios.push(worker);
        }

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- LÓGICA DO CRONÔMETRO ---
        let segundos = 0;
        setInterval(() => {
            segundos++;
            const min = Math.floor(segundos / 60).toString().padStart(2, '0');
            const seg = (segundos % 60).toString().padStart(2, '0');
            document.getElementById('cronometro').innerText = `TEMPO: ${min}:${seg}`;
        }, 1000);

        // --- LOOP DE ANIMAÇÃO ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Animar operários (Movimento repetitivo e alienado)
            operarios.forEach(op => {
                op.position.y = 4.5 + Math.sin(Date.now() * op.userData.velocidade) * 0.5;
            });

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
