<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taylorismo 1900: A Era Mecânica</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        
        /* Filtro de Filme Antigo (Vintage) */
        #viewport-container { 
            width: 100vw; height: 100vh; 
            filter: sepia(0.3) contrast(1.1) brightness(0.9);
        }
        #grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.12; pointer-events: none; z-index: 50;
        }

        /* Interface Retrô (HUD) */
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #d4af37; pointer-events: none; z-index: 10; text-shadow: 1px 1px #000; }
        .hud-top { display: flex; justify-content: space-around; width: 100%; font-size: 18px; background: rgba(46, 34, 20, 0.8); border-bottom: 2px solid #5d4037; padding: 10px 0; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1510; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #e2c08d; text-align: center; padding: 20px; border: 15px double #5d4037; box-sizing: border-box; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #5d4037; color: white; border: 3px double #d4af37; text-transform: uppercase; font-family: serif; }
        
        #joy-container { position: absolute; bottom: 50px; left: 50px; width: 110px; height: 110px; z-index: 20; opacity: 0.4; border: 2px solid #d4af37; border-radius: 50%; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 1px solid rgba(212,175,55,0.5); transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="grain"></div>
    <div id="overlay">
        <h1 style="letter-spacing: 3px;">OFICINA MECÂNICA TAYLOR</h1>
        <p style="font-style: italic;">Turno de 60 segundos iniciado.</p>
        <p>REQUISITO: Sincronize as 5 prensas de vapor com falha (Vermelhas).</p>
        <button onclick="startApp()">Acionar Vapor</button>
    </div>

    <div id="ui">
        <div class="hud-top">
            <div id="score">COTAS: 0</div>
            <div id="timer">RELÓGIO: 60s</div>
        </div>
        <p id="msg" style="color: #d4af37; font-size: 14px; margin-top: 5px;">Máquinas desajustadas: 5</p>
    </div>

    <div class="crosshair"></div>
    <div id="joy-container"></div>
    <div id="viewport-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script>

    <script>
        let scene, camera, renderer, joy, machines = [], operarios = [], score = 0, targetsLeft = 5;
        let moveF = 0, moveR = 0, yaw = 0, pitch = 0;

        function startApp() {
            document.getElementById('overlay').style.display = 'none';
            init();
            startTimer();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1510);
            scene.fog = new THREE.Fog(0x1a1510, 2, 40);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('viewport-container').appendChild(renderer.domElement);

            // Luzes Quentes (Filamento de Carbono)
            const ambient = new THREE.AmbientLight(0x443322, 1);
            scene.add(ambient);
            
            const lamp = new THREE.PointLight(0xffcc88, 2, 30);
            lamp.position.set(0, 10, 0);
            scene.add(lamp);

            // CHÃO: Concreto Gasto e Madeira Suja
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x2e2214, 
                roughness: 1, 
                metalness: 0
            });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Adicionar vigas de madeira no chão para textura
            const beamGeo = new THREE.BoxGeometry(0.2, 0.01, 100);
            const beamMat = new THREE.MeshBasicMaterial({color: 0x111111});
            for(let i=-50; i<50; i+=2) {
                const beam = new THREE.Mesh(beamGeo, beamMat);
                beam.position.set(i, 0.01, 0);
                scene.add(beam);
            }

            // --- CRIAÇÃO DOS OPERÁRIOS E MÁQUINAS (ESTILO 1900) ---
            for(let i=0; i<20; i++) {
                createMachineAndWorker(i);
            }

            setupControls();
            animate();
        }

        // Função para criar Operários e Máquinas com aparência Retrô
        function createMachineAndWorker(id) {
            const machineGroup = new THREE.Group();
            const machinePos = new THREE.Vector3((Math.random()-0.5)*50, 0.4, (Math.random()-0.5)*50);
            
            // 1. A Máquina (Prensa de Vapor)
            const matFerro = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.6 });
            const matLatão = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, metalness: 1 });

            // Base de Metal Pesado
            const base = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.4, 0.8, 8), matFerro);
            machineGroup.add(base);

            // Cilindro Principal
            const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 3), matFerro);
            cylinder.position.y = 1.9;
            machineGroup.add(cylinder);

            // Engrenagens Visíveis (Roda de Inércia)
            const gear = new THREE.Mesh(new THREE.TorusGeometry(1, 0.1, 8, 16), matLatão);
            gear.rotation.y = Math.PI/2;
            gear.position.y = 2;
            machineGroup.add(gear);

            // Pistão Móvel (Haste de Aço Polido)
            const isTarget = id < 5;
            const matHaste = new THREE.MeshStandardMaterial({ 
                color: isTarget ? 0x990000 : 0xaaaaaa, // Alvo: Vermelho
                metalness: 1, 
                roughness: 0.1,
                emissive: isTarget ? 0x220000 : 0x000000
            });
            const head = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 3, 8), matHaste);
            
            const pistonGroup = new THREE.Group();
            pistonGroup.add(head);
            pistonGroup.position.y = 3;
            pistonGroup.userData = { id: id, broken: isTarget, initialY: 3, gear: gear };
            
            machineGroup.add(pistonGroup);
            machineGroup.position.copy(machinePos);
            scene.add(machineGroup);
            machines.push(pistonGroup);

            // 2. O Operário (Modelo Simples de Época)
            const workerGroup = new THREE.Group();
            
            // Macacão/Roupas de Ferroviário (Marrom sujo)
            const workerMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f });
            
            // Corpo e Cabeça
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.3), workerMat);
            const headOp = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshBasicMaterial({color: 0xe2c08d})); // Pele
            headOp.position.y = 0.5;
            
            // Chapéu (Estilo Boater/Flat cap)
            const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.1, 8), new THREE.MeshBasicMaterial({color: 0x111111}));
            hat.position.y = 0.7;
            
            // Braço que opera (Simbolizando o trabalho)
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.5, 0.1), new THREE.MeshBasicMaterial({color: 0xe2c08d}));
            arm.position.set(0.3, 0.2, 0.1);
            
            workerGroup.add(torso);
            workerGroup.add(headOp);
            workerGroup.add(hat);
            workerGroup.add(arm);
            
            // Dados para animação individual
            workerGroup.userData = { arm: arm, initialY: 1.2, speed: 0.05 + Math.random()*0.02 };
            
            // Posicionar o operário em frente à máquina
            workerGroup.position.set(machinePos.x, workerGroup.userData.initialY, machinePos.z - 1.5);
            workerGroup.rotation.y = -Math.PI/2;
            scene.add(workerGroup);
            operarios.push(workerGroup);
        }

        // --- CONTROLES MOBILE ---
        function setupControls() {
            joy = nipplejs.create({ zone: document.getElementById('joy-container'), mode: 'static', position: {left: '55px', bottom: '55px'}, size: 85 });
            joy.on('move', (e, d) => {
                moveF = Math.sin(d.angle.radian) * d.distance / 45;
                moveR = Math.cos(d.angle.radian) * d.distance / 45;
            });
            joy.on('end', () => { moveF = 0; moveR = 0; });

            let lastX = 0, lastY = 0;
            window.addEventListener('touchstart', (e) => {
                if (e.touches[0].clientX > window.innerWidth / 2) checkInteraction();
            });

            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t.clientX > window.innerWidth / 2) {
                    if (lastX !== 0) {
                        yaw -= (t.clientX - lastX) * 0.005;
                        pitch -= (t.clientY - lastY) * 0.005;
                        pitch = Math.max(-1.4, Math.min(1.4, pitch));
                    }
                    lastX = t.clientX; lastY = t.clientY;
                }
            });
            window.addEventListener('touchend', () => { lastX = 0; lastY = 0; });
        }

        function checkInteraction() {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(machines, true);
            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while(obj.parent && !obj.userData.initialY) obj = obj.parent;
                
                if (obj.userData.broken) {
                    obj.children[0].material.color.set(0xaaaaaa); // Cor de aço polido
                    obj.children[0].material.emissive.set(0x000000);
                    obj.userData.broken = false;
                    targetsLeft--;
                    score += 100;
                    document.getElementById('score').innerText = `COTAS: ${score}`;
                    document.getElementById('msg').innerText = `Máquinas desajustadas: ${targetsLeft}`;
                }
            }
        }

        function startTimer() {
            let time = 60;
            const t = setInterval(() => {
                if(time > 0) {
                    time--;
                    document.getElementById('timer').innerText = `RELÓGIO: ${time}s`;
                } else {
                    clearInterval(t); alert("Fim do turno! Cotas produzidas: " + score); location.reload();
                }
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            const dir = new THREE.Vector3(moveR, 0, -moveF).applyQuaternion(camera.quaternion);
            dir.y = 0;
            camera.position.addScaledVector(dir, 0.13);
            camera.position.y = 1.7;

            // ANIMAR MÁQUINAS E OPERÁRIOS
            machines.forEach((p, i) => {
                const s = p.userData.broken ? 0.008 : 0.004;
                p.position.y = p.userData.initialY + Math.sin(Date.now() * s + i) * 1.2;
                // Engrenagem girando
                p.userData.gear.rotation.z += 0.01;
            });

            // ANIMAR OPERÁRIOS (Movimento repetitivo de braço)
            operarios.forEach(op => {
                op.userData.arm.rotation.x = Math.sin(Date.now() * op.userData.speed) * 0.5;
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
