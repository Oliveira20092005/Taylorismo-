<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taylorismo 3D Pro - A Fábrica de Aço</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        
        /* Efeito de Lente Profissional (Old Cam) */
        #container { width: 100vw; height: 100vh; filter: contrast(1.2) brightness(0.9) grayscale(0.5) sepia(0.2); }
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px rgba(0,0,0,0.7); pointer-events: none; }
        
        /* Interface de Taylor (HUD) */
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #ffaa00; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #cronometro { font-size: 28px; font-weight: bold; color: #ff0000; }
        
        /* Joystick Virtual (Totalmente invisível para não atrapalhar a visão) */
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; z-index: 20; }
        
        /* Instruções */
        .legenda { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; font-size: 12px; background: rgba(0,0,0,0.5); padding: 5px 0; z-index: 5; }
    </style>
</head>
<body>

    <div id="vignette"></div>
    
    <div id="ui">
        <h2 style="margin:0">SISTEMA DE EFICIÊNCIA INDUSTRIAL</h2>
        <div id="cronometro">TEMPO: 00:00</div>
        <p>Produtividade Requerida: 120%</p>
    </div>
    
    <div class="legenda">Lado Esquerdo: Andar | Lado Direito: Olhar</div>
    <div id="joy-base"></div> <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script> <script>
        // 1. Configuração Básica e Cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.7; // Altura dos olhos (FPS)

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container').appendChild(renderer.domElement);

        // 2. Iluminação Industrial
        scene.add(new THREE.AmbientLight(0x404040, 1.2));
        const light = new THREE.PointLight(0xffdd00, 1.5, 60);
        light.position.set(0, 15, 0);
        scene.add(light);

        // Fog (Neblina de Fábrica)
        scene.fog = new THREE.FogExp2(0x222222, 0.03);

        // 3. Chão e Textura (Chapa de Metal)
        const grid = new THREE.GridHelper(100, 40, 0x444444, 0x222222);
        scene.add(grid);

        // 4. Mecânica de Taylor: Criando Máquinas e Operários
        const operarios = [];
        const boxGeo = new THREE.BoxGeometry(2, 4, 2);
        const handGeo = new THREE.BoxGeometry(0.3, 0.3, 1);

        for(let i=0; i<30; i++) {
            const mMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
            const box = new THREE.Mesh(boxGeo, mMat);
            box.position.set((Math.random()-0.5)*70, 2, (Math.random()-0.5)*70);
            scene.add(box);
            
            // O Operário (Uma esfera vermelha que 'martela')
            const opMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const worker = new THREE.Mesh(new THREE.SphereGeometry(0.5), opMat);
            worker.position.set(box.position.x, 4.5, box.position.z);
            
            // O Braço que Martela (O movimento repetitivo de Taylor)
            const hand = new THREE.Mesh(handGeo, new THREE.MeshBasicMaterial({ color: 0x0000ff }));
            hand.position.set(box.position.x, 4.2, box.position.z + 1);
            
            // Dados para animação individual
            worker.userData = { offset: Math.random() * Math.PI, speed: 0.06 + Math.random()*0.02 };
            hand.userData = { startZ: hand.position.z };
            
            scene.add(worker);
            scene.add(hand);
            operarios.push({head: worker, hand: hand});
        }

        // 5. MECÂNICA DE OLHAR (Toque na direita)
        let yaw = 0, pitch = 0;
        let lastTouchX = 0, lastTouchY = 0;

        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (touch.clientX > window.innerWidth / 2) { // Lado direito olha
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            }
        });

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            if (touch.clientX > window.innerWidth / 2) {
                const deltaX = touch.clientX - lastTouchX;
                const deltaY = touch.clientY - lastTouchY;
                
                // Sensibilidade do iPhone
                yaw -= deltaX * 0.003;
                pitch -= deltaY * 0.003;
                pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch)); // Trava o pescoço
                
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            }
        });

        // 6. MECÂNICA DE ANDAR (NippleJS - Joystick Esquerdo)
        let moveForward = 0, moveRight = 0;
        const manager = nipplejs.create({
            zone: document.getElementById('joy-base'),
            mode: 'static',
            position: { left: '70px', bottom: '110px' },
            color: 'rgba(255,255,255,0.05)', // Super transparente
            size: 100
        });

        manager.on('move', (evt, data) => {
            if (data.direction) {
                moveForward = Math.sin(data.angle.radian) * data.distance / 50;
                moveRight = Math.cos(data.angle.radian) * data.distance / 50;
            }
        });

        manager.on('end', () => { moveForward = 0; moveRight = 0; });

        // --- LÓGICA DO CRONÔMETRO ---
        let segundos = 0;
        setInterval(() => {
            segundos++;
            const min = Math.floor(segundos / 60).toString().padStart(2, '0');
            const seg = (segundos % 60).toString().padStart(2, '0');
            document.getElementById('cronometro').innerText = `TEMPO: ${min}:${seg}`;
        }, 1000);

        // 7. LOOP DE ANIMAÇÃO PROFISISONAL
        function animate() {
            requestAnimationFrame(animate);
            
            // Aplicar Rotação (Olhar)
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            
            // Aplicar Movimento (Andar)
            const speed = 0.08;
            camera.position.addScaledVector(new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion), moveForward * speed);
            camera.position.addScaledVector(new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion), moveRight * speed);
            camera.position.y = 1.7; // Trava a altura para não voar
            
            // Animar operários (Movimento alienado)
            operarios.forEach(op => {
                op.head.position.y = 4.5 + Math.sin(Date.now() * op.head.userData.speed + op.head.userData.offset) * 0.3;
                op.hand.position.z = op.hand.userData.startZ + Math.sin(Date.now() * op.head.userData.speed*2) * 0.3;
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
