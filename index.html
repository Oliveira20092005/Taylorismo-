<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fábrica Taylorista 3D VR - Versão Final</title>
  <style>
    /* Mantendo seus estilos originais */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; background: #07101c; color: white; touch-action: none; }
    canvas { display: block; }

    #topBar {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 30;
      width: min(96vw, 760px); display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 10px 14px; border-radius: 18px; background: rgba(7, 16, 30, 0.84);
      border: 1px solid rgba(255,255,255,0.14); backdrop-filter: blur(10px); font-size: 13px;
    }

    .topBadge { padding: 6px 10px; border-radius: 999px; background: rgba(37,99,235,0.18); border: 1px solid rgba(147,197,253,0.25); font-weight: bold; }
    .miniProgress { width: 120px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; }
    .miniProgressFill { width: 0%; height: 100%; background: linear-gradient(90deg, #22c55e, #38bdf8, #2563eb); transition: width 0.35s ease; }

    #prompt { position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%); z-index: 35; background: rgba(0,0,0,0.78); border-radius: 16px; padding: 12px 16px; display: none; text-align: center; }

    #menuOverlay, #infoPanel, #quizPanel, #victoryPanel {
      position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center;
      background: rgba(2, 6, 23, 0.84); backdrop-filter: blur(8px); padding: 18px;
    }

    .card { width: min(1000px, 96vw); max-height: 90vh; overflow: auto; background: #1e293b; border-radius: 24px; padding: 24px; border: 1px solid rgba(255,255,255,0.1); }
    .heroTitle { font-size: clamp(24px, 5vw, 40px); margin: 0; color: #e0f2fe; }
    .buttons { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    button { border: none; border-radius: 12px; padding: 12px 20px; font-weight: bold; cursor: pointer; background: #2563eb; color: white; }
    .green { background: #16a34a; }
    .gold { background: #ca8a04; }

    /* Estilo do botão de VR que o Three.js injeta */
    #VRButton { bottom: 20px !important; border-radius: 12px !important; background: #2563eb !important; }
  </style>
</head>
<body>

  <div id="topBar">
    <div class="leftInfo">
      <div class="topBadge">Fábrica Taylorista VR</div>
      <div id="statusText">0/4 estações</div>
      <div class="miniProgress"><div id="progressFill" class="miniProgressFill"></div></div>
    </div>
    <div id="scoreLine">Quiz 0/10 • Nota 0,0</div>
  </div>

  <div id="prompt"></div>

  <div id="menuOverlay" style="display:flex;">
    <div class="card">
      <h1 class="heroTitle">FÁBRICA TAYLORISTA VR</h1>
      <p>Coloque seu headset ou use o navegador para explorar.</p>
      <p><strong>Controles VR:</strong> Use o Gatilho (Trigger) para andar e interagir.</p>
      <div class="buttons">
        <button id="startBtn" class="green">Iniciar no Navegador</button>
        <button id="audioBtn" class="gold">Ativar Som</button>
      </div>
    </div>
  </div>

  <div id="infoPanel"><div class="card"><h2 id="infoTitle"></h2><div id="infoContent"></div><button id="closeInfoBtn">Fechar</button></div></div>
  <div id="quizPanel"><div class="card"><h2>Quiz</h2><p id="quizQuestion"></p><div id="quizOptions"></div><div id="quizFeedback"></div><button id="quizNextBtn" style="display:none;">Próxima</button><button id="quizFinishBtn" class="green" style="display:none;">Finalizar</button></div></div>
  <div id="victoryPanel"><div class="card"><h2>Concluído</h2><div id="victoryContent"></div><button id="continueBtn" class="green">Voltar</button></div></div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";
    import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/webxr/VRButton.js";

    // Variáveis Globais (Mantendo sua lógica)
    let scene, camera, renderer, clock, cameraGroup;
    let playerVisual, isMenuOpen = true;
    let currentInteractable = null;
    let visitedStations = new Set();
    let conveyorBelts = [], boxesOnBelts = [], npcs = [];
    let audioCtx = null, audioEnabled = false;
    let controller1, controller2;

    const keys = { forward: false, backward: false, left: false, right: false };
    let yaw = Math.PI, pitch = -0.28;

    // Dados (Mesmos do seu código)
    const stations = [
        { id: "origem", title: "1. O que é o Taylorismo?", position: [-22, 0, -14], html: `<p>O Taylorismo foi um sistema de organização criado por Frederick Taylor focado em eficiência e padronização.</p>` },
        { id: "divisao", title: "2. Divisão do trabalho", position: [22, 0, -14], html: `<p>Cada operário executa uma função específica, tornando-se especialista.</p>` },
        { id: "tempo", title: "3. Controle do tempo", position: [-22, 0, 18], html: `<p>Estudo de tempos e movimentos para eliminar gestos inúteis.</p>` },
        { id: "criticas", title: "4. Críticas", position: [22, 0, 18], html: `<p>Trabalho repetitivo e visão do homem como peça de máquina.</p>` }
    ];

    const quizData = [
      { q: "Quem criou o Taylorismo?", options: ["Karl Marx", "Frederick Taylor", "Henry Ford"], correct: 1 },
      { q: "Qual o foco principal?", options: ["Arte", "Eficiência Industrial", "Lazer"], correct: 1 }
    ];

    let quizIndex = 0, quizScore = 0;

    init();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x08111f);
      scene.fog = new THREE.Fog(0x08111f, 35, 120);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true; // ATIVA O VR
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      // Grupo para Câmera e Controles VR
      cameraGroup = new THREE.Group();
      cameraGroup.position.set(0, 0, 31);
      scene.add(cameraGroup);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 300);
      camera.position.set(0, 1.6, 0); // Altura dos olhos
      cameraGroup.add(camera);

      clock = new THREE.Clock();

      setupControllers();
      addLights();
      buildEnvironment();
      createStations();
      createNPCs();
      addEventListeners();

      // Loop de animação compatível com VR
      renderer.setAnimationLoop(render);
    }

    function setupControllers() {
        controller1 = renderer.xr.getController(0);
        controller1.addEventListener('selectstart', () => { keys.forward = true; tryInteract(); });
        controller1.addEventListener('selectend', () => keys.forward = false);
        cameraGroup.add(controller1);

        controller2 = renderer.xr.getController(1);
        controller2.addEventListener('selectstart', () => { keys.forward = true; tryInteract(); });
        controller2.addEventListener('selectend', () => keys.forward = false);
        cameraGroup.add(controller2);
    }

    // --- Funções de Construção (Simplificadas para performance mas mantendo seu visual) ---

    function buildEnvironment() {
      const floor = new THREE.Mesh(new THREE.PlaneGeometry(130, 130), new THREE.MeshStandardMaterial({ color: 0x334155 }));
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      // Paredes
      const wallMat = new THREE.MeshStandardMaterial({ color: 0x1f2937 });
      const w1 = new THREE.Mesh(new THREE.BoxGeometry(84, 16, 1), wallMat);
      w1.position.set(0, 8, -42);
      scene.add(w1);

      // Esteiras (Simplificado)
      for (let i = -2; i <= 2; i++) {
        const belt = new THREE.Mesh(new THREE.BoxGeometry(7, 1, 36), new THREE.MeshStandardMaterial({color: 0x111827}));
        belt.position.set(i * 12, 0.5, 0);
        scene.add(belt);
      }
    }

    function createStations() {
      stations.forEach((s, i) => {
        const group = new THREE.Group();
        group.position.set(...s.position);
        
        const orb = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshStandardMaterial({ color: 0x2563eb, emissive: 0x2563eb }));
        orb.position.y = 2;
        group.add(orb);
        
        group.userData = { type: "station", station: s };
        scene.add(group);
      });
    }

    function addLights() {
      scene.add(new THREE.AmbientLight(0xffffff, 0.8));
      const sun = new THREE.DirectionalLight(0xffffff, 1);
      sun.position.set(5, 10, 5);
      scene.add(sun);
    }

    function render() {
      const dt = clock.getDelta();
      
      if (!isMenuOpen) {
        // Movimentação VR: Segue a direção da câmera
        if (keys.forward) {
          const dir = new THREE.Vector3();
          camera.getWorldDirection(dir);
          dir.y = 0;
          dir.normalize();
          cameraGroup.position.addScaledVector(dir, 5 * dt);
        }

        // Lógica de colisão básica com as bordas
        cameraGroup.position.x = Math.max(-40, Math.min(40, cameraGroup.position.x));
        cameraGroup.position.z = Math.max(-40, Math.min(40, cameraGroup.position.z));

        detectNearbyInteractable();
      }

      // Animar orbes
      scene.traverse(obj => {
        if(obj.userData.type === "station") obj.rotation.y += 0.02;
      });

      renderer.render(scene, camera);
    }

    function detectNearbyInteractable() {
      let nearest = null;
      let dist = 999;

      scene.traverse(obj => {
        if(obj.userData.type === "station") {
          const d = obj.position.distanceTo(cameraGroup.position);
          if(d < dist) { dist = d; nearest = obj; }
        }
      });

      if(nearest && dist < 5) {
        currentInteractable = nearest;
        document.getElementById("prompt").style.display = "block";
        document.getElementById("prompt").innerHTML = "Gatilho para ler estação";
      } else {
        currentInteractable = null;
        document.getElementById("prompt").style.display = "none";
      }
    }

    function tryInteract() {
      if(!currentInteractable) return;
      const s = currentInteractable.userData.station;
      visitedStations.add(s.id);
      
      document.getElementById("infoTitle").innerText = s.title;
      document.getElementById("infoContent").innerHTML = s.html;
      document.getElementById("infoPanel").style.display = "flex";
      
      updateProgress();
    }

    function updateProgress() {
      const p = (visitedStations.size / 4) * 100;
      document.getElementById("progressFill").style.width = p + "%";
      document.getElementById("statusText").innerText = visitedStations.size + "/4 estações";
    }

    // --- Event Listeners e UI ---
    function addEventListeners() {
      document.getElementById("startBtn").onclick = () => {
        document.getElementById("menuOverlay").style.display = "none";
        isMenuOpen = false;
        enableAudio();
      };
      document.getElementById("closeInfoBtn").onclick = () => {
        document.getElementById("infoPanel").style.display = "none";
      };
      document.getElementById("audioBtn").onclick = enableAudio;
    }

    function enableAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioEnabled = true;
    }

    function createNPCs() {
        // Exemplo simplificado para não pesar no VR mobile
        const npc = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x1f3559}));
        npc.position.set(5, 1, 5);
        scene.add(npc);
    }
  </script>
</body>
</html>
