<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taylorismo: O Grande Galpão 1900</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Georgia', serif; touch-action: none; }
        #viewport { width: 100vw; height: 100vh; filter: sepia(0.2) contrast(1.1); }
        #grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.1; pointer-events: none; z-index: 50; }
        #ui { position: absolute; top: 0; width: 100%; text-align: center; color: #d4af37; pointer-events: none; z-index: 10; }
        .hud-top { display: flex; justify-content: space-around; width: 100%; background: linear-gradient(to bottom, rgba(46,34,20,0.9), transparent); padding: 15px 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1510; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #e2c08d; text-align: center; padding: 20px; }
        button { padding: 15px 50px; font-size: 22px; cursor: pointer; background: #8b5a2b; color: white; border: 2px solid #d4af37; text-transform: uppercase; font-family: serif; }
        #joy-container { position: absolute; bottom: 50px; left: 50px; width: 110px; height: 110px; z-index: 20; opacity: 0.5; border: 2px solid #d4af37; border-radius: 50%; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 1px solid #d4af37; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="grain"></div>
    <div id="overlay">
        <h1>GALPÃO INDUSTRIAL TAYLOR</h1>
        <p>Ajuste o ritmo das máquinas para atingir a cota do dia.</p>
        <button onclick="startApp()">Entrar no Galpão</button>
    </div>

    <div id="ui">
        <div class="hud-top">
            <div id="score">PRODUÇÃO: 0</div>
            <div id="timer">TURNO: 60s</div>
        </div>
    </div>

    <div class="crosshair"></div>
    <div id="joy-container"></div>
    <div id="viewport"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script>

    <script>
        let scene, camera, renderer, joy, machines = [], score = 0, targetsLeft = 5;
        let moveF = 0, moveR = 0, yaw = 0, pitch = 0;

        function startApp() {
            document.getElementById('overlay').style.display = 'none';
            init();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x332211);
            scene.fog = new THREE.Fog(0x332211, 5, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('viewport').appendChild(renderer.domElement);

            // 1. ILUMINAÇÃO DE GALPÃO (MAIS CLARA)
            const ambient = new THREE.AmbientLight(0xffffff, 0.6); // Luz geral
            scene.add(ambient);
            
            const mainLight = new THREE.DirectionalLight(0xffcc88, 1); // Luz do teto amarelada
            mainLight.position.set(10, 20, 10);
            scene.add(mainLight);

            // 2. CONSTRUÇÃO DO GALPÃO (Paredes e Teto)
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x443322, roughness: 1 });
            
            // Chão de tijolos/pedra
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({color: 0x221a11}));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Paredes (Norte, Sul, Leste, Oeste)
            const wallGeo = new THREE.PlaneGeometry(80, 20);
            
            const createWall = (z, x, rotY) => {
                const w = new THREE.Mesh(wallGeo, wallMat);
                w.position.set(x, 10, z);
                w.rotation.y = rotY;
                scene.add(w);
            };

            createWall(-40, 0, 0);          // Parede Fundo
            createWall(40, 0, Math.PI);     // Parede Frente
            createWall(0, -40, Math.PI/2);  // Parede Esquerda
            createWall(0, 40, -Math.PI/2); // Parede Direita

            // Vigas do Teto
            const beamGeo = new THREE.BoxGeometry(80, 0.5, 0.5);
            for(let i = -40; i <= 40; i += 10) {
                const beam = new THREE.Mesh(beamGeo, new THREE.MeshStandardMaterial({color: 0x111111}));
                beam.position.set(0, 18, i);
                scene.add(beam);
            }

            // 3. MÁQUINAS PISTÃO COMPLEXAS
            for(let i=0; i<15; i++) {
                createMachine(i);
            }

            setupControls();
            animate();
            startTimer();
        }

        function createMachine(id) {
            const group = new THREE.Group();
            
            // Base de Metal Pesado
            const base = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1, 2.5), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
            group.add(base);

            // Estrutura de Suporte (Pistão Externo)
            const housing = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0x2e2214, metalness: 0.5}));
            housing.position.y = 2;
            group.add(housing);

            // Pistão Móvel (Haste de Latão/Aço)
            const isTarget = id < 5;
            const piston = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 5, 8), new THREE.MeshStandardMaterial({
                color: isTarget ? 0xcc0000 : 0x8b5a2b,
                metalness: 1,
                roughness: 0.2
            }));
            
            const pistonGroup = new THREE.Group();
            pistonGroup.add(piston);
            pistonGroup.position.y = 4;
            pistonGroup.userData = { id, broken: isTarget, initialY: 4 };
            
            group.add(pistonGroup);
            group.position.set((Math.random()-0.5)*60, 0.5, (Math.random()-0.5)*60);
            scene.add(group);
            machines.push(pistonGroup);
        }

        function setupControls() {
            joy = nipplejs.create({ zone: document.getElementById('joy-container'), mode: 'static', position: {left: '55px', bottom: '55px'}, size: 85 });
            joy.on('move', (e, d) => {
                moveF = Math.sin(d.angle.radian) * d.distance / 45;
                moveR = Math.cos(d.angle.radian) * d.distance / 45;
            });
            joy.on('end', () => { moveF = 0; moveR = 0; });

            let lastX = 0, lastY = 0;
            window.addEventListener('touchstart', (e) => {
                if (e.touches[0].clientX > window.innerWidth / 2) {
                    const ray = new THREE.Raycaster();
                    ray.setFromCamera(new THREE.Vector2(0, 0), camera);
                    const hits = ray.intersectObjects(machines, true);
                    if (hits.length > 0) {
                        let obj = hits[0].object;
                        while(obj.parent && !obj.userData.initialY) obj = obj.parent;
                        if (obj.userData.broken) {
                            obj.children[0].material.color.set(0x8b5a2b);
                            obj.userData.broken = false;
                            score += 100;
                            document.getElementById('score').innerText = `PRODUÇÃO: ${score}`;
                        }
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t.clientX > window.innerWidth / 2) {
                    if (lastX !== 0) {
                        yaw -= (t.clientX - lastX) * 0.005;
                        pitch -= (t.clientY - lastY) * 0.005;
                        pitch = Math.max(-1.4, Math.min(1.4, pitch));
                    }
                    lastX = t.clientX; lastY = t.clientY;
                }
            });
            window.addEventListener('touchend', () => { lastX = 0; lastY = 0; });
        }

        function startTimer() {
            let time = 60;
            const t = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = `TURNO: ${time}s`;
                if (time <= 0) { clearInterval(t); alert("Turno encerrado!"); location.reload(); }
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            const dir = new THREE.Vector3(moveR, 0, -moveF).applyQuaternion(camera.quaternion);
            dir.y = 0;
            camera.position.addScaledVector(dir, 0.15);
            camera.position.y = 1.7;

            machines.forEach((p, i) => {
                const s = p.userData.broken ? 0.01 : 0.004;
                p.position.y = p.userData.initialY + Math.sin(Date.now() * s + i) * 1.5;
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
