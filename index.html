<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fábrica Taylorista VR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }
#quizUI {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-family: Arial;
}
button {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="quizUI"></div>

<a-scene vr-mode-ui="enabled: true">

<!-- Luz -->
<a-light type="ambient" intensity="0.6"></a-light>
<a-light type="directional" position="2 4 2"></a-light>

<!-- Chão -->
<a-plane rotation="-90 0 0" width="50" height="50" color="#555"></a-plane>

<!-- Pistões (fábrica) -->
<a-box position="-3 1 -5" color="gray" animation="property: position; to: -3 3 -5; dir: alternate; loop: true; dur: 1000"></a-box>
<a-box position="3 1 -5" color="gray" animation="property: position; to: 3 3 -5; dir: alternate; loop: true; dur: 800"></a-box>

<!-- NPC -->
<a-box id="npc" position="0 1 -3" color="blue"></a-box>
<a-text value="NPC (Clique)" position="0 2 -3" align="center"></a-text>

<!-- Jogador -->
<a-entity id="player" position="0 1.6 5">
  <a-camera wasd-controls look-controls></a-camera>
</a-entity>

</a-scene>

<script>
let quiz = [
  {
    pergunta: "O que é Taylorismo?",
    opcoes: ["Organização científica do trabalho", "Tipo de máquina"],
    correta: 0
  },
  {
    pergunta: "Quem criou o Taylorismo?",
    opcoes: ["Taylor", "Einstein"],
    correta: 0
  },
  {
    pergunta: "Objetivo principal?",
    opcoes: ["Eficiência", "Diversão"],
    correta: 0
  }
];

let atual = 0;

function mostrarQuiz() {
  if (atual >= quiz.length) {
    document.getElementById("quizUI").innerHTML =
      "<h2>Fim do Quiz!</h2>";
    return;
  }

  let q = quiz[atual];

  let html = `<h2>${q.pergunta}</h2>`;
  q.opcoes.forEach((op, i) => {
    html += `<button onclick="responder(${i})">${op}</button>`;
  });

  document.getElementById("quizUI").innerHTML = html;
}

function responder(i) {
  if (i === quiz[atual].correta) {
    alert("Correto!");
  } else {
    alert("Errado!");
  }
  atual++;
  mostrarQuiz();
}

// Clique no NPC inicia quiz
document.querySelector("#npc").addEventListener("click", () => {
  mostrarQuiz();
});

// Movimento mobile (corrigido)
let player = document.querySelector("#player");
document.addEventListener("touchmove", (e) => {
  player.object3D.position.z -= 0.05;
});

// Pulo
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    let pos = player.object3D.position;
    pos.y += 1;
    setTimeout(()=> pos.y -= 1, 300);
  }
});
</script>

</body>
</html>
