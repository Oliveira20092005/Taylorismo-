<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taylorismo: Mechanical Age</title>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; font-family: 'Georgia', serif; touch-action: none; }
        #viewport { width: 100vw; height: 100vh; filter: sepia(0.3) contrast(1.2) brightness(0.85); }
        #grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.12; pointer-events: none; z-index: 50; }
        #ui { position: absolute; top: 0; width: 100%; text-align: center; color: #d4af37; pointer-events: none; z-index: 10; }
        .hud-top { display: flex; justify-content: space-around; width: 100%; background: linear-gradient(to bottom, #2e2214, transparent); padding: 15px 0; border-bottom: 1px solid #5d4037; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #3d2b1f, #1a1510); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #e2c08d; text-align: center; padding: 20px; border: 15px double #5d4037; box-sizing: border-box; }
        button { padding: 15px 50px; font-size: 22px; cursor: pointer; background: #5d4037; color: #e2c08d; border: 3px double #d4af37; font-family: 'Georgia', serif; text-transform: uppercase; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        #joy-container { position: absolute; bottom: 50px; left: 50px; width: 110px; height: 110px; z-index: 20; opacity: 0.3; border: 2px solid #d4af37; border-radius: 50%; background: rgba(0,0,0,0.2); }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 1px solid #d4af37; transform: translate(-50%, -50%); pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="grain"></div>
    <div id="overlay">
        <h1 style="letter-spacing: 5px;">MÁQUINA DO TEMPO TAYLOR</h1>
        <p style="font-style: italic;">"A ciência deve substituir o palpite individual."</p>
        <hr style="width: 200px; border: 1px solid #d4af37;">
        <p>REQUISITO: Sincronize as 5 válvulas de pressão vermelhas.</p>
        <button onclick="startApp()">Acionar Vapor</button>
    </div>

    <div id="ui">
        <div class="hud-top">
            <div id="score">PRODUÇÃO: 0</div>
            <div id="timer">TURNO: 60s</div>
        </div>
        <p id="msg" style="color: #d4af37; font-size: 14px; margin-top: 5px;">Válvulas críticas: 5</p>
    </div>

    <div class="crosshair"></div>
    <div id="joy-container"></div>
    <div id="viewport"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script>

    <script>
        let scene, camera, renderer, joy, machines = [], score = 0, targetsLeft = 5;
        let moveF = 0, moveR = 0, yaw = 0, pitch = 0;

        function startApp() {
            document.getElementById('overlay').style.display = 'none';
            init();
            startTimer();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1510);
            scene.fog = new THREE.Fog(0x1a1510, 1, 35);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('viewport').appendChild(renderer.domElement);

            // Luzes Quentes (Filamento)
            const ambient = new THREE.AmbientLight(0x443322, 1.2);
            scene.add(ambient);
            
            const lamp = new THREE.PointLight(0xffcc88, 2, 40);
            lamp.position.set(0, 15, 0);
            scene.add(lamp);

            // Chão: Concreto Gasto
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0x221a15, roughness: 1 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Criar Máquinas Complexas
            for(let i=0; i<15; i++) {
                createComplexPiston(i);
            }

            setupControls();
            animate();
        }

        function createComplexPiston(id) {
            const group = new THREE.Group();
            
            // 1. Base (Ferro Fundido)
            const base = new THREE.Mesh(
                new THREE.CylinderGeometry(1.2, 1.5, 0.8, 8),
                new THREE.MeshStandardMaterial({color: 0x2a2a2a, metalness: 0.5})
            );
            group.add(base);

            // 2. Camisa do Pistão (Cilindro Externo Detalhado)
            const housing = new THREE.Mesh(
                new THREE.CylinderGeometry(0.8, 0.8, 3, 12),
                new THREE.MeshStandardMaterial({color: 0x3d2b1f, roughness: 0.6})
            );
            housing.position.y = 1.8;
            group.add(housing);

            // Anéis de Latão decorativos
            for(let j=0; j<3; j++) {
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(0.85, 0.05, 8, 24),
                    new THREE.MeshStandardMaterial({color: 0x8b5a2b, metalness: 1})
                );
                ring.rotation.x = Math.PI/2;
                ring.position.y = 1 + j;
                group.add(ring);
            }

            // 3. O Pistão Móvel (Haste de Aço Polido)
            const rod = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.3, 4, 8),
                new THREE.MeshStandardMaterial({color: 0xaaaaaa, metalness: 1, roughness: 0.1})
            );
            
            // 4. Cabeça do Pistão (Válvula)
            const isTarget = id < 5;
            const valve = new THREE.Mesh(
                new THREE.SphereGeometry(0.7, 12, 12),
                new THREE.MeshStandardMaterial({
                    color: isTarget ? 0xcc0000 : 0x555555,
                    emissive: isTarget ? 0x440000 : 0x000000,
                    metalness: 0.8
                })
            );
            valve.position.y = 2; // Relativo à haste
            
            const pistonSystem = new THREE.Group();
            pistonSystem.add(rod);
            pistonSystem.add(valve);
            pistonSystem.position.y = 3;
            
            pistonSystem.userData = { id: id, broken: isTarget, initialY: 3 };
            group.add(pistonSystem);

            group.position.set((Math.random()-0.5)*40, 0.4, (Math.random()-0.5)*40);
            scene.add(group);
            machines.push(pistonSystem);
        }

        function setupControls() {
            joy = nipplejs.create({ zone: document.getElementById('joy-container'), mode: 'static', position: {left: '55px', bottom: '55px'}, size: 85 });
            joy.on('move', (e, d) => {
                moveF = Math.sin(d.angle.radian) * d.distance / 45;
                moveR = Math.cos(d.angle.radian) * d.distance / 45;
            });
            joy.on('end', () => { moveF = 0; moveR = 0; });

            let lastX = 0, lastY = 0;
            window.addEventListener('touchstart', (e) => {
                if (e.touches[0].clientX > window.innerWidth / 2) checkInteraction();
            });

            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t.clientX > window.innerWidth / 2) {
                    if (lastX !== 0) {
                        yaw -= (t.clientX - lastX) * 0.005;
                        pitch -= (t.clientY - lastY) * 0.005;
                        pitch = Math.max(-1.4, Math.min(1.4, pitch));
                    }
                    lastX = t.clientX; lastY = t.clientY;
                }
            });
            window.addEventListener('touchend', () => { lastX = 0; lastY = 0; });
        }

        function checkInteraction() {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(machines, true);
            if (intersects.length > 0) {
                // Encontrar o grupo do pistão
                let obj = intersects[0].object;
                while(obj.parent && !obj.userData.initialY) obj = obj.parent;
                
                if (obj.userData.broken) {
                    // Mudar cor da cabeça (filho do grupo)
                    obj.children[1].material.color.set(0x8b5a2b);
                    obj.children[1].material.emissive.set(0x000000);
                    obj.userData.broken = false;
                    targetsLeft--;
                    score += 100;
                    document.getElementById('score').innerText = `PRODUÇÃO: ${score}`;
                    document.getElementById('msg').innerText = `Válvulas críticas: ${targetsLeft}`;
                }
            }
        }

        function startTimer() {
            let time = 60;
            const t = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = `TURNO: ${time}s`;
                if (time <= 0) { clearInterval(t); alert("Fim do turno! Produção: " + score); location.reload(); }
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            const dir = new THREE.Vector3(moveR, 0, -moveF).applyQuaternion(camera.quaternion);
            dir.y = 0;
            camera.position.addScaledVector(dir, 0.13);
            camera.position.y = 1.7;

            machines.forEach((p, i) => {
                const speed = p.userData.broken ? 0.01 : 0.004;
                // Animação real de pistão (sobe e desce dentro da camisa)
                p.position.y = p.userData.initialY + Math.sin(Date.now() * speed + i) * 1.2;
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
