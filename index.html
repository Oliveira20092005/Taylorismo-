<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taylorismo: 1900 Industrial Experience</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: 'Georgia', serif; touch-action: none; }
        
        /* Filtro de Filme Antigo */
        #viewport { 
            width: 100vw; height: 100vh; 
            filter: sepia(0.4) contrast(1.1) brightness(0.8);
        }
        #grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.15; pointer-events: none; z-index: 50;
        }

        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #e2c08d; pointer-events: none; z-index: 10; text-shadow: 1px 1px #000; }
        .hud-top { display: flex; justify-content: space-around; width: 100%; background: rgba(46, 34, 20, 0.8); border-bottom: 2px solid #8b5a2b; padding: 10px 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2e2214; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #e2c08d; text-align: center; padding: 20px; border: 10px double #8b5a2b; box-sizing: border-box; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #8b5a2b; color: white; border: 2px solid #e2c08d; font-family: 'Georgia', serif; text-transform: uppercase; }
        #joy-container { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; z-index: 20; opacity: 0.4; border: 2px solid #e2c08d; border-radius: 50%; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; border: 1px solid #e2c08d; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="grain"></div>
    <div id="overlay">
        <h1 style="font-size: 30px;">GERÊNCIA CIENTÍFICA<br><small>Frederick Taylor - 1911</small></h1>
        <p>Elimine a vadiagem sistemática. <br>Padronize as máquinas defeituosas (Vermehas).</p>
        <button onclick="startApp()">Iniciar Turno</button>
    </div>

    <div id="ui">
        <div class="hud-top">
            <div id="score">PRODUÇÃO: 0</div>
            <div id="timer">RELÓGIO: 60s</div>
        </div>
        <p id="msg" style="color: #e2c08d; font-style: italic;">Máquinas desajustadas: 5</p>
    </div>

    <div class="crosshair"></div>
    <div id="joy-container"></div>
    <div id="viewport"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script>

    <script>
        let scene, camera, renderer, joy, machines = [], score = 0, targetsLeft = 5;
        let moveF = 0, moveR = 0, yaw = 0, pitch = 0;

        function startApp() {
            document.getElementById('overlay').style.display = 'none';
            init();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1510);
            scene.fog = new THREE.Fog(0x1a1510, 2, 40);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('viewport').appendChild(renderer.domElement);

            // Iluminação Âmbar (Lâmpadas antigas)
            scene.add(new THREE.AmbientLight(0x443322, 1));
            const sun = new THREE.DirectionalLight(0xffe4b5, 0.8);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // Chão de Concreto/Pedra
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0x332211, roughness: 0.9 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Criar Máquinas "Retrô"
            for(let i=0; i<15; i++) {
                createRetroMachine(i);
            }

            setupControls();
            animate();
            startTimer();
        }

        function createRetroMachine(id) {
            const group = new THREE.Group();
            
            // Base de Tijolo/Ferro
            const base = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 2), new THREE.MeshStandardMaterial({color: 0x3d2b1f}));
            group.add(base);

            // Pistão de Bronze
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 3), new THREE.MeshStandardMaterial({color: 0x8b5a2b, metalness: 0.8}));
            stem.position.y = 1.5;
            group.add(stem);

            // Cabeça da Prensa (A que muda de cor)
            const isTarget = id < 5;
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), new THREE.MeshStandardMaterial({
                color: isTarget ? 0x880000 : 0xcd7f32,
                emissive: isTarget ? 0x220000 : 0x000000
            }));
            head.position.y = 3;
            head.userData = { id: id, broken: isTarget };
            group.add(head);

            group.position.set((Math.random()-0.5)*40, 0.5, (Math.random()-0.5)*40);
            scene.add(group);
            machines.push(head);
        }

        function setupControls() {
            joy = nipplejs.create({ zone: document.getElementById('joy-container'), mode: 'static', position: {left: '50px', bottom: '50px'}, size: 80 });
            joy.on('move', (e, d) => {
                moveF = Math.sin(d.angle.radian) * d.distance / 40;
                moveR = Math.cos(d.angle.radian) * d.distance / 40;
            });
            joy.on('end', () => { moveF = 0; moveR = 0; });

            let lastX = 0, lastY = 0;
            window.addEventListener('touchstart', (e) => {
                if (e.touches[0].clientX > window.innerWidth / 2) checkInteraction();
            });

            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t.clientX > window.innerWidth / 2) {
                    if (lastX !== 0) {
                        yaw -= (t.clientX - lastX) * 0.005;
                        pitch -= (t.clientY - lastY) * 0.005;
                        pitch = Math.max(-1.4, Math.min(1.4, pitch));
                    }
                    lastX = t.clientX; lastY = t.clientY;
                }
            });
            window.addEventListener('touchend', () => { lastX = 0; lastY = 0; });
        }

        function checkInteraction() {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(machines);
            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if (obj.userData.broken) {
                    obj.material.color.set(0xcd7f32); // Cor de bronze
                    obj.userData.broken = false;
                    targetsLeft--;
                    score += 100;
                    document.getElementById('score').innerText = `PRODUÇÃO: ${score}`;
                    document.getElementById('msg').innerText = `MÁQUINAS RESTANTES: ${targetsLeft}`;
                }
            }
        }

        function startTimer() {
            let time = 60;
            setInterval(() => {
                if(time > 0) {
                    time--;
                    document.getElementById('timer').innerText = `RELÓGIO: ${time}s`;
                }
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            const dir = new THREE.Vector3(moveR, 0, -moveF).applyQuaternion(camera.quaternion);
            dir.y = 0;
            camera.position.addScaledVector(dir, 0.12);
            camera.position.y = 1.7;

            machines.forEach((m, i) => {
                const s = m.userData.broken ? 0.008 : 0.004;
                m.position.y = 2.5 + Math.sin(Date.now() * s + i) * 0.8;
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
