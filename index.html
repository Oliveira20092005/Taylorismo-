<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taylorismo: Minecraft Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; image-rendering: pixelated; }
        /* Mira Estilo Minecraft */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; }
        #joy-container { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; z-index: 20; background: rgba(0,0,0,0.3); border-radius: 10px; border: 2px solid #555; }
        /* Filtro de Pixel Art */
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; background: rgba(0,0,0,0.5); display: inline-block; padding: 5px;">TURNO TAYLORISTA</h2>
        <div id="stats" style="font-size: 18px;">ITENS PRODUZIDOS: 0</div>
    </div>

    <div id="crosshair"></div>
    <div id="joy-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script>

    <script>
        let scene, camera, renderer, joy, score = 0;
        let moveF = 0, moveR = 0, yaw = 0, pitch = 0;
        let workers = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 2, 25);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 5);

            renderer = new THREE.WebGLRenderer({ antialias: false }); // Antialias OFF para parecer Minecraft
            renderer.setSize(window.innerWidth / 2, window.innerHeight / 2, false); // Renderiza metade do tamanho
            renderer.domElement.style.width = '100vw'; // Estica para dar efeito pixelado
            renderer.domElement.style.height = '100vh';
            document.body.appendChild(renderer.domElement);

            // 1. ILUMINAÇÃO (Estilo Tocha)
            const ambient = new THREE.AmbientLight(0x222222);
            scene.add(ambient);

            function createTorch(x, z) {
                const light = new THREE.PointLight(0xffaa44, 2, 12);
                light.position.set(x, 2.5, z);
                scene.add(light);
                
                // Suporte da Tocha
                const stick = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.2), new THREE.MeshStandardMaterial({color: 0x442200}));
                stick.position.set(x, 2.3, z);
                scene.add(stick);
            }

            // Espalhar tochas pelo corredor
            for(let i = -20; i <= 20; i += 8) {
                createTorch(-4.8, i);
                createTorch(4.8, i);
            }

            // 2. O CORREDOR/GALPÃO (Minecraft Style)
            const blockMat = new THREE.MeshStandardMaterial({ color: 0x444444 }); // Pedra/Cobblestone
            
            // Chão e Teto
            for(let x = -5; x <= 5; x++) {
                for(let z = -30; z <= 30; z++) {
                    const floorBlock = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), blockMat);
                    floorBlock.position.set(x, -0.5, z);
                    scene.add(floorBlock);

                    const ceilBlock = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), blockMat);
                    ceilBlock.position.set(x, 4.5, z);
                    scene.add(ceilBlock);
                }
            }

            // Paredes Laterais
            for(let y = 0; y <= 4; y++) {
                for(let z = -30; z <= 30; z++) {
                    const wallL = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), blockMat);
                    wallL.position.set(-5.5, y, z);
                    scene.add(wallL);

                    const wallR = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), blockMat);
                    wallR.position.set(5.5, y, z);
                    scene.add(wallR);
                }
            }

            // 3. OPERÁRIOS E MÁQUINAS (Blocos)
            for(let i = 0; i < 10; i++) {
                createWorker( (i%2==0 ? 3 : -3), i * -5 );
            }

            setupControls();
        }

        function createWorker(x, z) {
            const group = new THREE.Group();
            
            // Máquina (Bigorna/Mesa)
            const desk = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 1.2), new THREE.MeshStandardMaterial({color: 0x111111}));
            group.add(desk);

            // Operário (Corpo de Bloco)
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.4), new THREE.MeshStandardMaterial({color: 0x3344ff})); // Camisa azul
            body.position.set(0, 1.2, 0.8);
            group.add(body);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffccaa})); // Pele
            head.position.set(0, 1.8, 0.8);
            group.add(head);

            // Braço (O que se move)
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), new THREE.MeshStandardMaterial({color: 0xffccaa}));
            arm.position.set(0.4, 1.3, 0.6);
            group.add(arm);

            group.position.set(x, 0.5, z);
            scene.add(group);
            workers.push({ group, arm, initialZ: arm.position.z });
        }

        function setupControls() {
            joy = nipplejs.create({ zone: document.getElementById('joy-container'), mode: 'static', position: {left: '50px', bottom: '50px'}, size: 80 });
            joy.on('move', (e, d) => {
                moveF = Math.sin(d.angle.radian) * d.distance / 40;
                moveR = Math.cos(d.angle.radian) * d.distance / 40;
            });
            joy.on('end', () => { moveF = 0; moveR = 0; });

            let lastX = 0, lastY = 0;
            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t.clientX > window.innerWidth / 2) {
                    if (lastX !== 0) {
                        yaw -= (t.clientX - lastX) * 0.005;
                        pitch -= (t.clientY - lastY) * 0.005;
                        pitch = Math.max(-1.4, Math.min(1.4, pitch));
                    }
                    lastX = t.clientX; lastY = t.clientY;
                }
            });
            window.addEventListener('touchend', () => { lastX = 0; lastY = 0; });
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            
            const dir = new THREE.Vector3(moveR, 0, -moveF).applyQuaternion(camera.quaternion);
            dir.y = 0;
            camera.position.addScaledVector(dir, 0.1);
            camera.position.y = 1.6;

            // Animar braços dos operários (Ritmo Taylorista)
            workers.forEach((w, i) => {
                w.arm.rotation.x = Math.sin(Date.now() * 0.01 + i) * 1;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
